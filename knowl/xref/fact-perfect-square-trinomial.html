</h2>
<div class="para logical">
<div class="para">If <span class="process-math">\(A\)</span> and <span class="process-math">\(B\)</span> are any algebraic expressions, then:</div>
<div class="displaymath process-math">
\begin{align*}
A^2+2AB+B^2 \amp= (A+B)^2\amp\amp\text{and}\amp A^2-2AB+B^2 \amp= (A-B)^2
\end{align*}
</div>
