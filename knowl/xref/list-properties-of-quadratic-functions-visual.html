<figure class="list table-like"><figcaption><span class="type">List</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">1.6.12<span class="period heading-divison-mark heading-divison-mark__period">.</span></span><span class="space heading-divison-mark heading-divison-mark__space"> </span>Summary of Key Features of Quadratic Graphs<div class="autopermalink" aria-hidden="true" data-description="List 1.6.12: Summary of Key Features of Quadratic Graphs"><a tabindex="-1" href="#list-properties-of-quadratic-functions-visual" title="Copy heading and permalink for List 1.6.12: Summary of Key Features of Quadratic Graphs" aria-label="Copy heading and permalink for List 1.6.12: Summary of Key Features of Quadratic Graphs">🔗</a></div></figcaption><div class="named-list-content">
<div class="introduction">
<div class="para">Consider a quadratic equation in the form <span class="process-math">\(y=ax^2+bx+c\)</span> and the parabola that it makes when graphed.<div class="autopermalink" aria-hidden="true" data-description="Paragraph"><a tabindex="-1" href="#list-properties-of-quadratic-functions-visual-2-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</div>
<dl class="description-list">
<dt>Direction<div class="autopermalink" aria-hidden="true" data-description="Item: Direction"><a tabindex="-1" href="#item-direction" title="Copy heading and permalink for Item: Direction" aria-label="Copy heading and permalink for Item: Direction">🔗</a></div>
</dt>
<dd>
<div class="para">The parabola opens upward if <span class="process-math">\(a\)</span> is positive and opens downward of <span class="process-math">\(a\)</span> is negative.<div class="autopermalink" aria-hidden="true" data-description="Paragraph"><a tabindex="-1" href="#item-direction-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</dd>
<dt>Vertex<div class="autopermalink" aria-hidden="true" data-description="Item: Vertex"><a tabindex="-1" href="#item-vertex" title="Copy heading and permalink for Item: Vertex" aria-label="Copy heading and permalink for Item: Vertex">🔗</a></div>
</dt>
<dd>
<div class="para">The vertex of the parabola is the maximum or minimum point on the graph.<div class="autopermalink" aria-hidden="true" data-description="Paragraph"><a tabindex="-1" href="#item-vertex-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</dd>
<dt>Axis of Symmetry<div class="autopermalink" aria-hidden="true" data-description="Item: Axis of Symmetry"><a tabindex="-1" href="#axis-of-symmetry" title="Copy heading and permalink for Item: Axis of Symmetry" aria-label="Copy heading and permalink for Item: Axis of Symmetry">🔗</a></div>
</dt>
<dd>
<div class="para">The axis of symmetry is the vertical line that passes through the vertex.<div class="autopermalink" aria-hidden="true" data-description="Paragraph"><a tabindex="-1" href="#axis-of-symmetry-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</dd>
<dt>Vertical Intercept<div class="autopermalink" aria-hidden="true" data-description="Item: Vertical Intercept"><a tabindex="-1" href="#item-vertical-intercept" title="Copy heading and permalink for Item: Vertical Intercept" aria-label="Copy heading and permalink for Item: Vertical Intercept">🔗</a></div>
</dt>
<dd>
<div class="para">The vertical intercept is the point where the graph intersects the vertical axis. There is exactly one vertical intercept.<div class="autopermalink" aria-hidden="true" data-description="Paragraph"><a tabindex="-1" href="#item-vertical-intercept-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</dd>
<dt>Horizontal Intercept(s)<div class="autopermalink" aria-hidden="true" data-description="Item: Horizontal Intercept(s)"><a tabindex="-1" href="#item-horizontal-intercepts" title="Copy heading and permalink for Item: Horizontal Intercept(s)" aria-label="Copy heading and permalink for Item: Horizontal Intercept(s)">🔗</a></div>
</dt>
<dd>
<div class="para">The horizontal intercept(s) are the point(s) where a graph intersects the horizontal axis. The graph of a parabola can have zero, one, or two horizontal intercepts.<div class="autopermalink" aria-hidden="true" data-description="Paragraph"><a tabindex="-1" href="#item-horizontal-intercepts-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</dd>
</dl>
</div>
