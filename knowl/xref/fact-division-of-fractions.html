<div class="para logical">
<div class="para">As long as <span class="process-math">\(b\text{,}\)</span> <span class="process-math">\(c\)</span> and <span class="process-math">\(d\)</span> are not <span class="process-math">\(0\text{,}\)</span> then division with fractions works this way:</div>
<div class="displaymath process-math">
\begin{equation*}
\frac{a}{b} \div \frac{c}{d} = \frac{a}{b}\cdot\frac{d}{c}
\end{equation*}
</div>
