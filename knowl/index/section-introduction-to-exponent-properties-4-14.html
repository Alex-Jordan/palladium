<div class="para">This demonstrates our third exponent rule, the <dfn class="terminology">Product to a Power Rule</dfn>: when a              product is raised to an exponent, we can apply the exponent to each factor in the product.</div>
<div class="displaymath process-math">
\begin{equation*}
\left(x\cdot y\right)^n = x^{n}\cdot y^{n}
\end{equation*}
</div>
