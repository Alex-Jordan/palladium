<figure class="list table-like"><figcaption><span class="type">List</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">1.5.23<span class="period heading-divison-mark heading-divison-mark__period">.</span></span><span class="space heading-divison-mark heading-divison-mark__space"> </span>Three Types of Systems of Two Linear Equations in Two Variables<div class="autopermalink" aria-hidden="true" data-description="List 1.5.23: Three Types of Systems of Two Linear Equations in Two Variables"><a tabindex="-1" href="#list-summary-of-types-of-systems" title="Copy heading and permalink for List 1.5.23: Three Types of Systems of Two Linear Equations in Two Variables" aria-label="Copy heading and permalink for List 1.5.23: Three Types of Systems of Two Linear Equations in Two Variables">🔗</a></div></figcaption><div class="named-list-content"><dl class="description-list narrow">
<dt>Crossing Lines<div class="autopermalink" aria-hidden="true" data-description="Item: Crossing Lines"><a tabindex="-1" href="#list-summary-of-types-of-systems-3-1" title="Copy heading and permalink for Item: Crossing Lines" aria-label="Copy heading and permalink for Item: Crossing Lines">🔗</a></div>
</dt>
<dd>
<div class="para">If two linear equations make lines with different slopes, the system has one solution. That one solution is the place where the lines cross.<div class="autopermalink" aria-hidden="true" data-description="Paragraph"><a tabindex="-1" href="#list-summary-of-types-of-systems-3-1-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</dd>
<dt>Parallel Lines<div class="autopermalink" aria-hidden="true" data-description="Item: Parallel Lines"><a tabindex="-1" href="#list-summary-of-types-of-systems-3-2" title="Copy heading and permalink for Item: Parallel Lines" aria-label="Copy heading and permalink for Item: Parallel Lines">🔗</a></div>
</dt>
<dd>
<div class="para">If two linear equations make lines with the same slope but different <span class="process-math">\(y\)</span>-intercepts, the system has no solution.<div class="autopermalink" aria-hidden="true" data-description="Paragraph"><a tabindex="-1" href="#list-summary-of-types-of-systems-3-2-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</dd>
<dt>Coinciding Lines<div class="autopermalink" aria-hidden="true" data-description="Item: Coinciding Lines"><a tabindex="-1" href="#list-summary-of-types-of-systems-3-3" title="Copy heading and permalink for Item: Coinciding Lines" aria-label="Copy heading and permalink for Item: Coinciding Lines">🔗</a></div>
</dt>
<dd>
<div class="para">If two linear equations make lines with the same slope and the same <span class="process-math">\(y\)</span>-intercept (in other words, they make the same line), the system has infinitely many solutions. This solution set consists of all ordered pairs on that line.<div class="autopermalink" aria-hidden="true" data-description="Paragraph"><a tabindex="-1" href="#list-summary-of-types-of-systems-3-3-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
</dd>
</dl></div>
