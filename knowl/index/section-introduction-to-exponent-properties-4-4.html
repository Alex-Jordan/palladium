<div class="para">This demonstrates our first exponent rule, the <dfn class="terminology">Product Rule</dfn>: when multiplying two           expressions that have the same base, we can simplify the product by adding the exponents.</div>
<div class="displaymath process-math">
\begin{equation}
x^m \cdot x^n = x^{m+n}\tag{A.8.1}
\end{equation}
</div>
